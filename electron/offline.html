<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem Conexão — Romatec CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 1.5rem;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f1f5f9;
    }

    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #15803d; }

    .url {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📡</span>
    <h1>Sem conexão com a internet</h1>
    <p>
      O Romatec CRM precisa de internet para funcionar.<br />
      Verifique sua conexão e tente novamente.
    </p>
    <button class="btn" onclick="window.location.href='https://romateccrm.com'">
      Tentar novamente
    </button>
    <div class="url">romateccrm.com</div>
  </div>
</body>
</html>
